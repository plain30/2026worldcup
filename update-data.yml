name: Update World Cup data

# FIFA 공식 데이터(api.fifa.com) 기반 자동 갱신 — API 키 불필요.
# UTC 기준 30분마다 + 수동 실행 버튼.
on:
  schedule:
    - cron: "*/30 * * * *"  # 30분마다 (원하는 주기로 수정 가능. 예: 1시간 "0 * * * *")
  workflow_dispatch:        # Actions 탭에서 직접 실행

permissions:
  contents: write           # data.json/data.js 커밋/푸시 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater (FIFA → football-data 폴백, 선수기록=API-Football)
        env:
          # FIFA가 응답하지 않을 때를 대비한 선택적 폴백 토큰(없어도 FIFA로 동작).
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          # 득점·도움 순위(선수기록) 자동 갱신용 API-Football 키(없으면 선수순위는 시드값 유지).
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: python scripts/update_data.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json data.js)" ]; then
            git add data.json data.js
            git commit -m "chore: auto-update data (FIFA) [skip ci]"
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
